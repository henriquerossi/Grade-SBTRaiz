name: Atualizar Grade de TV

on:
  schedule:
    - cron: '0 3 */3 * *'  # Roda a cada 3 dias (00:00 Horário de Brasília)
  workflow_dispatch:       # Permite rodar manualmente pelo botão "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: pip install pandas requests

      - name: Executar script de processamento
        run: python limpar_mestre.py

      - name: Salvar Mudanças no Github
        run: |
          git config --global user.name 'GradeBot'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "Backup e atualização do arquivo mestre consolidado" || exit 0
          git push
